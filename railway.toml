[services.cron-compliance]
cronSchedule = "0 16 * * *"
startCommand = "curl -X POST -H 'x-cron-secret: $CRON_SECRET' https://lypx-pla-production.up.railway.app/api/cron/compliance-sweep"

[services.cron-claims]
cronSchedule = "0 16 * * *"
startCommand = "curl -X POST -H 'x-cron-secret: $CRON_SECRET' https://lypx-pla-production.up.railway.app/api/cron/expire-claims"
